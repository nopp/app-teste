name: Sec

on:
  push:
    branches: [ "main" ]

jobs:
  semgrep:
      name: Scan
      runs-on: ubuntu-20.04
      container:
        image: returntocorp/semgrep
      steps:
      - uses: actions/checkout@v3
      - run: |-
          python3 -m pip install ansi2html
          mkdir output
          semgrep scan --config auto > output/opa
          cat output/opa | ansi2html > output/semgrep.html
          rm -rf output/opa
      - name: Upload-artifact
        uses: actions/upload-artifact@v2
        with: 
          name: semgrep-result
          path: output
